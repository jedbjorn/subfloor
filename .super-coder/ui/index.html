<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>subfloor — review</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>subfloor<span id="repo"></span></h1>
    <nav>
      <button data-tab="shells" class="active">Shells</button>
      <button data-tab="skills">Skills</button>
      <span class="navsep"></span>
      <button data-tab="roadmap">Roadmap</button>
      <button data-tab="docs">Docs</button>
      <button data-tab="flags">Flags</button>
      <span class="navsep"></span>
      <button data-tab="worktrees">Worktrees</button>
      <button data-tab="map">Repo Map</button>
      <button data-tab="analytics">Analytics</button>
      <button data-tab="scripts">Scripts</button>
    </nav>
    <div class="tools">
      <span id="status" class="status"></span>
      <button id="snapshot" title="serialize the DB → content.sql + render the flat _sc files (local only, no git)">snapshot ⤓</button>
      <button id="publish" class="primary" title="snapshot + render, then commit → force-push → open/update one PR from an ephemeral sc_gui_content branch (no merge; returns to main + cleans up)">publish ⤴</button>
    </div>
  </header>
  <main>
    <section id="view-shells" class="view"></section>
    <section id="view-skills" class="view" hidden></section>
    <section id="view-roadmap" class="view" hidden></section>
    <section id="view-docs" class="view" hidden></section>
    <section id="view-flags" class="view" hidden></section>
    <section id="view-worktrees" class="view" hidden></section>
    <section id="view-map" class="view" hidden></section>
    <section id="view-analytics" class="view" hidden></section>
    <section id="view-scripts" class="view" hidden></section>
  </main>
  <script src="/vendor/marked.umd.js"></script>
  <script src="/vendor/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
