name: render-check

# Guard both artifact modes. Tracked-mode forks compare their flat mirror with a
# hermetic render; this source repo uses local mode, so CI instead proves the
# public skill seed/migrations reconstruct the current engine catalogue without
# requiring any maintainer snapshot or rendered instance files in Git.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Rebuild the DB from public system text
        run: ./sc rebuild
      - name: Prove public skill migrations match engine assets
        run: python3 tests/test_skills_freshness.py
      - name: Fail if the flat _sc mirror drifts from the DB render
        run: ./sc render-check
